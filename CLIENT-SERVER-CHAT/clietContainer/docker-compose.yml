version: "3.8"

services:
  chat-client:
    build: .
    container_name: local-chat-client
    # CRITICAL: These two lines keep the terminal interactive so you can type messages!
    stdin_open: true
    tty: true
    environment:
      - SERVER_IP=host.docker.internal
      - KAFKA_BROKER=host.docker.internal:9092
    extra_hosts:
      - "host.docker.internal:host-gateway"
